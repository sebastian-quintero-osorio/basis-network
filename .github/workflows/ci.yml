name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  contracts:
    name: Smart Contracts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: l1/contracts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: l1/contracts/package-lock.json
      - run: npm ci
      - run: npx hardhat compile
      - run: npx hardhat test

  validium-node:
    name: Validium Node
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: validium/node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: validium/node/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test

  adapters:
    name: Adapters
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: validium/adapters
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: validium/adapters/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  dashboard:
    name: Dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: l1/dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: l1/dashboard/package-lock.json
      - run: npm ci
      - run: npx next build

  circuits:
    name: ZK Circuits
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: validium/circuits
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: validium/circuits/package-lock.json
      - run: npm ci
