\* MC_EnterpriseNode.cfg
\* TLC configuration for EnterpriseNode model checking.
\* 3 transactions, batch threshold 2, max 2 crashes.
\*
\* Expected result: ALL invariants PASS, EventualConfirmation PASS.
\* This configuration exercises the complete pipelined state machine
\* including crash recovery, L1 rejection, timer-triggered batches,
\* and concurrent ingestion during proving/submitting.

SPECIFICATION Spec

CONSTANTS
    tx1 = tx1
    tx2 = tx2
    tx3 = tx3
    AllTxs <- MC_AllTxs
    BatchThreshold = 2
    MaxCrashes = 2

INVARIANTS
    TypeOK
    ProofStateIntegrity
    NoDataLeakage
    NoTransactionLoss
    NoDuplication
    StateRootContinuity
    QueueWalConsistency
    BatchSizeBound

PROPERTIES
    EventualConfirmation
