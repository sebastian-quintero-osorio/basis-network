\* MC_DataAvailability.cfg
\* TLC configuration for DataAvailability model checking.
\* 3 nodes (n3 malicious), 2-of-3 threshold, 1 batch, full state-space exploration.
\*
\* Expected result: ALL invariants PASS, ALL liveness properties PASS.
\*
\* Scenarios exercised by TLC's exhaustive state-space search:
\*   - 2 honest nodes attest -> valid certificate (normal path)
\*   - 1 node offline during distribution -> reduced share holders
\*   - 2 nodes offline during distribution -> fallback triggers
\*   - Malicious node attests but corrupts recovery
\*   - Recovery with sub-threshold subset -> failed (privacy verified)
\*   - Node crash/recover interleavings at every protocol stage

SPECIFICATION Spec

CONSTANTS
    n1 = n1
    n2 = n2
    n3 = n3
    b1 = b1
    Nodes <- MC_Nodes
    Batches <- MC_Batches
    Threshold <- MC_Threshold
    Malicious <- MC_Malicious

INVARIANTS
    TypeOK
    CertificateSoundness
    DataAvailability
    Privacy
    RecoveryIntegrity
    AttestationIntegrity

PROPERTIES
    EventualCertification
    EventualFallback
