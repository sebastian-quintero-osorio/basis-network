\* MC_BatchAggregation.cfg
\* TLC configuration for BatchAggregation v1-fix model checking.
\* 4 transactions, batch size 2, full state-space exploration.
\*
\* Expected result: ALL invariants PASS, EventualProcessing PASS.
\* This configuration exercises the exact counterexample pattern from v0
\* (2 txs enqueued, timer-triggered batch, crash) and verifies that the
\* deferred checkpoint fix prevents transaction loss.

SPECIFICATION Spec

CONSTANTS
    tx1 = tx1
    tx2 = tx2
    tx3 = tx3
    tx4 = tx4
    AllTxs <- MC_AllTxs
    BatchSizeThreshold = 2

INVARIANTS
    TypeOK
    NoLoss
    NoDuplication
    QueueWalConsistency
    FIFOOrdering
    BatchSizeBound

PROPERTIES
    EventualProcessing
