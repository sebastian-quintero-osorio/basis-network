\* MC_BatchAggregation.cfg
\* TLC configuration for BatchAggregation model checking.
\* 10 transactions, batch size 4, no symmetry (Permutations too costly for 10).
\* BFS finds NoLoss counterexample at depth ~5 without symmetry.

SPECIFICATION Spec

CONSTANTS
    tx1 = tx1
    tx2 = tx2
    tx3 = tx3
    tx4 = tx4
    tx5 = tx5
    tx6 = tx6
    tx7 = tx7
    tx8 = tx8
    tx9 = tx9
    tx10 = tx10
    AllTxs <- MC_AllTxs
    BatchSizeThreshold = 4

INVARIANTS
    TypeOK
    NoLoss
    NoDuplication
    QueueWalConsistency
    FIFOOrdering
    BatchSizeBound

PROPERTIES
    EventualProcessing
