\* MC_CrossEnterprise.cfg
\* TLC configuration for CrossEnterprise model checking.
\* 2 enterprises, 2 batches each, 3 state roots, at most 1 cross-reference.
\* Safety checking only (no liveness). Use LiveSpec for liveness.

SPECIFICATION Spec

CONSTANTS
    E1 = E1
    E2 = E2
    B1 = B1
    B2 = B2
    R0 = R0
    R1 = R1
    R2 = R2
    Enterprises <- MC_Enterprises
    BatchIds <- MC_BatchIds
    StateRoots <- MC_StateRoots
    GenesisRoot = R0

CONSTRAINT MC_Constraint

INVARIANTS
    TypeOK
    Isolation
    Consistency
    NoCrossRefSelfLoop
