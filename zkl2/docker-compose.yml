# Basis Network zkEVM L2 -- Docker Compose
#
# Services:
#   - l2-node: Basis L2 node (sequencer + proving pipeline + RPC)
#   - dac-node-1..7: DAC committee members (gRPC, threshold 5-of-7)
#   - hardhat: Local L1 (for development/testing only)
#
# Usage:
#   docker compose up -d                     # Start L2 node only
#   docker compose --profile dac up -d       # Start L2 + DAC committee
#   docker compose --profile dev up -d       # Start L2 + local L1
#   docker compose logs -f                   # Follow logs
#   docker compose down                      # Stop all services

services:
  l2-node:
    build:
      context: .
      dockerfile: zkl2/node/Dockerfile
    container_name: basis-l2-node
    restart: unless-stopped
    ports:
      - "8545:8545"
    env_file:
      - zkl2/node/.env
    environment:
      - DAC_ENABLED=${DAC_ENABLED:-false}
      - DAC_LISTEN_ADDR=0.0.0.0:50051
      - DAC_THRESHOLD=5
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8545/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # DAC Committee Nodes (5-of-7 threshold)
  # Each node runs a gRPC server for share storage and attestation.
  dac-node-1:
    build:
      context: .
      dockerfile: zkl2/node/Dockerfile
    container_name: basis-dac-1
    restart: unless-stopped
    command: ["basis-l2", "--dac-only", "--dac-id=1"]
    environment:
      - DAC_LISTEN_ADDR=0.0.0.0:50051
      - DAC_NODE_ID=1
    ports:
      - "50051:50051"
    profiles:
      - dac
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  dac-node-2:
    build:
      context: .
      dockerfile: zkl2/node/Dockerfile
