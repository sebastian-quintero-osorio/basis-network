SPECIFICATION Spec

\* --- Constant Assignments ---
\* Using <- (override) syntax so TLC evaluates the MC module definitions
\* instead of treating the right-hand side as a model value.
CONSTANT
    Enterprises <- MC_Enterprises
    MaxProofsPerEnt <- MC_MaxProofsPerEnt
    BaseGasPerProof <- MC_BaseGasPerProof
    AggregatedGasCost <- MC_AggregatedGasCost

\* --- Safety Invariants ---
