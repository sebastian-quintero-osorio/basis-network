SPECIFICATION Spec

\* Model values for accounts (symmetry set for state reduction)
CONSTANTS
    A1 = A1
    A2 = A2
    A3 = A3
    S1 = S1
    S2 = S2

\* Constant assignments via operator overrides
CONSTANT Accounts        <- MC_Accounts
CONSTANT StorageSlots    <- MC_StorageSlots
CONSTANT MaxValue        <- MC_MaxValue
CONSTANT MaxTransactions <- MC_MaxTransactions
CONSTANT Programs        <- MC_Programs

\* --- Invariants ---
\* Type safety
INVARIANT TypeOK

\* Property 1: Determinism
INVARIANT Determinism

\* Property 2: Trace completeness
INVARIANT TraceCompleteness

\* Property 3: Opcode correctness
INVARIANT SloadAfterSstoreConsistency
INVARIANT SloadFromInitialState

\* Property 4: Balance integrity
INVARIANT NoNegativeBalance

\* Property 5: Balance conservation
INVARIANT BalanceConservation
