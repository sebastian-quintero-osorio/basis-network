\* ================================================================
\* TLC Configuration for StateDatabase Model Check
\* ================================================================
\*
\* Two-level SMT for EVM account model:
\*   3 accounts (1 EOA + 2 contracts), 2 storage slots per contract.
\*   Account trie depth 2 (4 leaves), storage trie depth 2 (4 leaves).
\*   Total supply = 3, storage values in {1, 2}.
\*
\* Run manually:
\*   java -cp tla2tools.jar tlc2.TLC MC_StateDatabase -workers auto
\*
\* Expected: PASS on all 5 invariants.

SPECIFICATION Spec

CONSTANT
    Addresses <- MC_Addresses
    Contracts <- MC_Contracts
    Slots <- MC_Slots
    MaxBalance <- MC_MaxBalance
    StorageValues <- MC_StorageValues
    ACCOUNT_DEPTH <- MC_ACCOUNT_DEPTH
    STORAGE_DEPTH <- MC_STORAGE_DEPTH

INVARIANT
    TypeOK
    ConsistencyInvariant
    AccountIsolation
    StorageIsolation
    BalanceConservation
