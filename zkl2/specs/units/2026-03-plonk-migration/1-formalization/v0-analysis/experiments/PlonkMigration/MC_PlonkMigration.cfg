SPECIFICATION Spec

\* --- Constant Assignments ---
\* Using <- (override) syntax so TLC evaluates the MC module definitions
\* instead of treating the right-hand side as a model value.
CONSTANT
    Enterprises <- MC_Enterprises
    MaxBatches <- MC_MaxBatches
    ProofSystems <- MC_ProofSystems
    MaxMigrationSteps <- MC_MaxMigrationSteps

\* --- Safety Invariants ---
INVARIANT
    TypeOK
    MigrationSafety
    BackwardCompatibility
    Soundness
    Completeness
    NoGroth16AfterCutover
    PhaseConsistency
    RollbackOnlyOnFailure
    NoBatchLossDuringRollback
