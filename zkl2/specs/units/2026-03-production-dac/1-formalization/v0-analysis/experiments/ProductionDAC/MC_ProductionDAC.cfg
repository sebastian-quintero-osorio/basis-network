\* MC_ProductionDAC.cfg
\* TLC configuration for ProductionDAC model checking.
\* 7 nodes (n6, n7 malicious), 5-of-7 threshold, 1 batch.
\* Full state-space exploration with 4 workers.
\*
\* Expected result: ALL invariants PASS, ALL liveness properties PASS.
\*
\* NOTE: For 7 nodes, temporal property checking produces ~10M+ distinct
\* states with expensive SCC analysis. Use MC_ProductionDAC_safety.cfg
\* for invariants-only (5 min) and MC_ProductionDAC_liveness.cfg/tla
\* for temporal properties on a reduced 5-node model (10 min).
\*
\* Scenarios exercised by TLC's exhaustive state-space search:
\*   - 5 honest nodes verify + attest -> valid certificate (normal path)
\*   - 1-2 nodes offline during distribution -> reduced chunk holders
\*   - 3+ nodes offline during distribution -> fallback triggers
\*   - Malicious node attests then corrupts (post-attestation corruption)
\*   - Malicious node corrupts before verification (KZG blocks attestation)
\*   - Recovery with >= 5 honest non-corrupted nodes -> success
\*   - Recovery with corrupted node in set -> corrupted (detected)
\*   - Recovery with sub-threshold subset -> failed (RS underdetermined)
\*   - Node crash/recover interleavings at every protocol stage

