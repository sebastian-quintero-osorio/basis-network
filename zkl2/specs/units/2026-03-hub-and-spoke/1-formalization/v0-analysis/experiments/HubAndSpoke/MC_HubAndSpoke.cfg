SPECIFICATION Spec

\* --- Constant Assignments ---
\* Enterprises are model values (not strings) to enable symmetry reduction.
\* MaxCrossTx and TimeoutBlocks are overridden from MC module definitions.
CONSTANT
    Enterprises = {e1, e2}
    MaxCrossTx <- MC_MaxCrossTx
    TimeoutBlocks <- MC_TimeoutBlocks

\* --- Symmetry Reduction ---
\* Reduces state space by factor 2! = 2.
\* Safe because all actions and invariants treat enterprises identically.
SYMMETRY MC_Symmetry

\* --- Safety Invariants ---
\* All 7 invariants enabled: TypeOK + 6 protocol properties (INV-CE5 through INV-CE10)
INVARIANT
    TypeOK
    CrossEnterpriseIsolation
    AtomicSettlement
    CrossRefConsistency
    ReplayProtection
    TimeoutSafety
    HubNeutrality
